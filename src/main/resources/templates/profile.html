<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profile.displayName} + ' — FeyProj'">Profile — FeyProj</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="feed-page">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="logo-mark">✦</span>
            <a th:href="@{/feed}" style="text-decoration:none;color:inherit;">FeyProj</a>
        </div>
        <div class="navbar-user">
            <div class="avatar avatar-sm"
                 th:style="'background-color:' + ${avatarColor}"
                 th:text="${avatarInitial}"></div>
            <a class="nav-display-name" th:href="@{'/profile/' + ${currentUser}}"
               th:text="${displayName}"></a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <button type="submit" class="btn-logout">Sign out</button>
            </form>
        </div>
    </nav>

    <div class="feed-layout">

        <!-- Back link -->
        <a th:href="@{/feed}" class="back-link">&#8592; Back to Feed</a>

        <!-- Profile card -->
        <div class="profile-card">
            <div class="profile-cover"></div>
            <div class="profile-body">
                <div class="profile-avatar-wrap">
                    <div class="avatar avatar-xl"
                         th:style="'background-color:' + ${profile.avatarColor}"
                         th:text="${profile.avatarInitial}"></div>
                </div>
                <div class="profile-info">
                    <div class="profile-names">
                        <h2 class="profile-display-name" th:text="${profile.displayName}"></h2>
                        <span class="profile-username" th:text="'@' + ${profile.username}"></span>
                    </div>
                    <p class="profile-bio"
                       th:if="${profile.bio != null and !#strings.isEmpty(profile.bio)}"
                       th:text="${profile.bio}"></p>
                    <p class="profile-bio profile-bio--empty"
                       th:unless="${profile.bio != null and !#strings.isEmpty(profile.bio)}">
                        No bio yet.
                    </p>
                    <div class="profile-stat">
                        <span class="profile-stat-num" th:text="${userPosts.size()}"></span>
                        post<span th:if="${userPosts.size() != 1}">s</span>
                    </div>
                </div>
                <div class="profile-actions" th:if="${isOwnProfile}">
                    <a th:href="@{/profile/edit}" class="btn btn-outline">Edit Profile</a>
                </div>
            </div>
        </div>

        <!-- Posts by this user -->
        <h3 class="section-heading" th:if="${!userPosts.empty}">Posts</h3>

        <div th:each="post : ${userPosts}"
             class="post-card"
             th:id="'post-' + ${post.id}">

            <div class="post-header">
                <div class="avatar"
                     th:style="'background-color:' + ${profile.avatarColor}"
                     th:text="${profile.avatarInitial}"></div>
                <div class="post-meta">
                    <span class="post-author" th:text="${profile.displayName}"></span>
                    <span class="post-time" th:text="${post.timeAgo}"></span>
                </div>
            </div>

            <div class="post-content">
                <p th:text="${post.content}"></p>
            </div>

            <div class="post-stats"
                 th:if="${post.likeCount > 0 or !post.comments.empty}">
                <span th:if="${post.likeCount > 0}" class="stat-likes">
                    <span class="heart-icon">♥</span>
                    <span th:text="${post.likeCount}"></span>
                </span>
                <span th:if="${!post.comments.empty}" class="stat-comments">
                    <span th:text="${post.comments.size()}"></span>
                    comment<span th:if="${post.comments.size() > 1}">s</span>
                </span>
            </div>

            <div class="post-actions">
                <form th:action="@{'/feed/' + ${post.id} + '/like'}" method="post">
                    <button type="submit"
                            th:class="${post.isLikedBy(currentUser)} ? 'btn-action liked' : 'btn-action'">
                        <span th:text="${post.isLikedBy(currentUser)} ? '♥ Liked' : '♡ Like'"></span>
                    </button>
                </form>
                <button type="button" class="btn-action"
                        th:onclick="'toggleComments(' + ${post.id} + ')'">
                    💬 Comment
                </button>
            </div>

            <div class="comments-section" th:id="'comments-' + ${post.id}">
                <div th:each="comment : ${post.comments}" class="comment">
                    <div class="avatar avatar-sm"
                         th:style="'background-color:' + ${comment.avatarColor}"
                         th:text="${comment.avatarInitial}"></div>
                    <div class="comment-body">
                        <div class="comment-header">
                            <span class="comment-author" th:text="${comment.displayName}"></span>
                            <span class="comment-time" th:text="${comment.timeAgo}"></span>
                        </div>
                        <p class="comment-text" th:text="${comment.content}"></p>
                    </div>
                </div>
                <form th:action="@{'/feed/' + ${post.id} + '/comment'}" method="post" class="comment-form">
                    <div class="avatar avatar-sm"
                         th:style="'background-color:' + ${avatarColor}"
                         th:text="${avatarInitial}"></div>
                    <div class="comment-input-wrap">
                        <input type="text" name="content" placeholder="Write a comment…"
                               class="comment-input" maxlength="500" autocomplete="off">
                        <button type="submit" class="btn-send" title="Post comment">&#10148;</button>
                    </div>
                </form>
            </div>
        </div>

        <p th:if="${userPosts.empty}" class="empty-feed">No posts yet.</p>
    </div>

    <script>
        function toggleComments(postId) {
            const section = document.getElementById('comments-' + postId);
            section.classList.toggle('open');
            if (section.classList.contains('open')) {
                section.querySelector('.comment-input')?.focus();
            }
        }
    </script>
</body>
</html>
